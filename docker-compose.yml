services:
  # -----------------------------------------------------------------
  # 1. Ollama Inference Server (Custom built)
  # -----------------------------------------------------------------
  ollama:
    build:
      context: ./services/ollama
      dockerfile: Dockerfile
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    # Enable NVIDIA GPU support if the host has the nvidia-container-toolkit installed
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # -----------------------------------------------------------------
  # 3. Core App (Sound-Vision Assistive Workflow)
  # -----------------------------------------------------------------
  sound-vision:
    build:
      context: ./services/sound-vision
      dockerfile: Dockerfile
    image: sound-vision-app
    container_name: sound-vision-app
    depends_on:
      - ollama
    devices:
      # Map the webcam
      - /dev/video0:/dev/video0
      # Map sound cards
      - /dev/snd:/dev/snd
    volumes:
      # Map PulseAudio socket for host audio output
      - /run/user/1000/pulse/native:/tmp/pulse-socket
      # Map X11 socket for GUI rendering (cv2.imshow)
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - PULSE_SERVER=unix:/tmp/pulse-socket
      - XDG_RUNTIME_DIR=/tmp
      - DISPLAY=${DISPLAY}
      - PYTHONUNBUFFERED=1
      # Tell the python script to hit this network alias instead of localhost
      - VLM_BASE_URL=http://ollama:11434/v1
      - VLM_MODEL=llama3.2-vision
    # Uncomment next line to test without speaking out loud
    command: ["python", "src/main.py", "--mute"]

volumes:
  ollama-models:
    # Persistent volume so you don't redownload 5GB every 'docker compose down'
